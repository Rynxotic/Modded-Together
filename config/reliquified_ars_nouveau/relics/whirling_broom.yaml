                    # Minimum threshold value for the stat, representing hard limits that cannot be surpassed through ability level upgrades or other methods
                    minThresholdValue: 4.9E-324
                    # Type of mathematical operation used to calculate the stat's value based on the ability level.
                    scalingModel: relics:multiplicative_base
                    # Value the stat reaches when both the stat quality and ability level are at their maximum.
