# Don't change this! Version used to track needed updates.
version = 3
# Static mappings - registry aliasing at startup (requires restart)
staticMappings = [  ]

# Debug and logging configuration

[debug]
# Logging level: NONE, ERRORS, WARNINGS, ALL
logLevel = "ERRORS"

# Dynamic mappings - runtime attribute conversion (reloadable)

[[dynamicMappings]]
# Source attribute
sourceAttribute = "spell_power:fire"
# Target attribute (comma-separated for fallback)
targetAttribute = "irons_spellbooks:fire_spell_power"
# Virtual display multiplier
equivalence = 3.0
# Modifier conversion divisor (0 = use equivalence)
conversionEquivalence = 20.0
# Direct redirection (no virtual value)
unidirectional = false
# Visual rename only
onlyVisualChange = false
# Freeze source, only target works
fullReplacement = false
# Subtract from target for display
subtractValue = 0.0
# Operation conversion
operationConversion = "ADDITION_TO_MULTIPLY_BASE"

