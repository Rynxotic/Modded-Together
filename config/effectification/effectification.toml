# Don't change this! Version used to track needed updates.
version = 6
# Static mappings - registry aliasing at startup (requires restart)
staticMappings = [  ]

[debug]
# Logging level: NONE, ERRORS, WARNINGS, ALL
logLevel = "ERRORS"

# Dynamic mappings - runtime effect conversion (reloadable)

[[dynamicMappings]]
# Source effect pattern: *:bleeding, *:bleeding*, modid:effect*, *:bleeding* !*:immunity
sourceEffect = "*:bleeding* !*:bleeding*_immunity !*:bleeding*_resistance"
# Target effect (comma-separated for fallback): primary:effect, fallback:effect
targetEffect = "majruszsdifficulty:bleeding, attributeslib:bleeding, valoria:bleeding"
# Amplifier multiplier
amplifierMultiplier = 1.0
# Visual change only (no amplifier conversion)
onlyVisualChange = false
# Unidirectional (prevents source mod handlers)
unidirectional = false
# Extra effects to call applyUpdateEffect() (comma-separated)
extraApplyEffectTick = ""
# Effects to block applyUpdateEffect() (comma-separated, supports wildcards)
discardEffectTick = ""

