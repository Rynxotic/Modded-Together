#Whether to log the dirt block on common setup
logDirtBlock = true
#A magic number
# Default: 42
# Range: > 0
magicNumber = 42
#What you want the introduction message to be for the magic number
magicNumberIntroduction = "The magic number is... "
#A list of items to log on common setup.
items = ["minecraft:iron_ingot"]
#Enable RTS Building survival progression, feature unlocks, home anchors, and progression radius limits.
enableSurvivalProgression = true
#When survival progression is enabled, share unlocked progression nodes and RTS home anchors with the player's FTB Team, or vanilla scoreboard team when FTB Teams is unavailable.
shareSurvivalProgressionWithTeams = false
#Maximum RTS action radius in blocks. Used directly when survival progression is disabled, and by the Radius Max skill when survival progression is enabled.
# Default: 128
# Range: 48 ~ 512
maxActionRadiusBlocks = 128
#Skill material overrides. Format: node_path=minecraft:item:count,minecraft:item2:count. Example: ultimine=minecraft:diamond_pickaxe:1,minecraft:redstone_block:1
progressionCostOverrides = ["radius_1=minecraft:glass:8", "radius_2=minecraft:redstone:12"]
